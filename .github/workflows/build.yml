name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'

    - name: Generate Missing Android Project Files
      run: |
        # यहाँ फ़्लटर खुद ही गायब एंड्रॉइड फ़ोल्डर को बिल्कुल सही तरीके से तैयार करेगा
        flutter create --platforms=android .
        
        # ब्लूटूथ और वॉयस फीचर के लिए minSdkVersion को बढ़ाकर 21 करना
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build APK (Final release)
      run: |
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSOS-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        
