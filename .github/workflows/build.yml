name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Core Flutter Setup
      run: |
        flutter config --no-analytics
        flutter create --platforms=android --project-name=smartsos .

    - name: Fix Android Gradle Version
      run: |
        # यहाँ हमने फाइल का नाम बदलकर .gradle.kts कर दिया है जो बिल्कुल सही है
        sed -i 's/id("com.android.application") version .*/id("com.android.application") version "8.1.0" apply false/' android/settings.gradle.kts || true
        sed -i 's/id("org.jetbrains.kotlin.android") version .*/id("org.jetbrains.kotlin.android") version "1.8.20" apply false/' android/settings.gradle.kts || true
        
        # ग्रैडल रैपर को भी सही सेट कर रहे हैं
        sed -i 's/gradle-.*-all.zip/gradle-8.1.1-all.zip/' android/gradle/wrapper/gradle-wrapper.properties || true

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build APK
      run: |
        flutter build apk --release --no-pub
