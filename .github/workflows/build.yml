name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Modern Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Pre-Generate Android Project Structure
      run: |
        flutter config --no-analytics
        # बिल्कुल फ्रेश एंड्रॉयड फ़ाइलें बनाना
        flutter create --platforms=android --project-name=smart_emergency_sos .
        
        # पैकेजेस के लिए न्यूनतम SDK वर्ज़न को 21 सेट करना
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build APK Release
      run: |
        # अब बिना किसी गलत फ्लैग के सीधे और साफ़ बिल्ड कमांड
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSOS-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
    
