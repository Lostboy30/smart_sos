name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Latest Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'

    - name: Create Complete Application Framework
      run: |
        flutter config --no-analytics
        # पुरानी अधूरी फाइलों का बैकअप लेना
        mv lib/main.dart .
        mv pubspec.yaml .
        rm -rf lib
        
        # बिल्कुल शुरू से एक फुल-फ्लेज्ड वर्किंग ऐप स्ट्रक्चर तैयार करना
        flutter create --platforms=android --project-name=smart_emergency_sos .
        
        # अपनी असली कोडिंग फाइलों को नए फ्रेमवर्क में वापस फिट करना
        mv main.dart lib/main.dart
        mv pubspec.yaml pubspec.yaml
        
        # ब्लूटूथ और वॉयस के लिए ग्रैडल सेटिंग्स को सीधे इंजेक्ट करना
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build Final APK Release
      run: |
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSOS-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        
