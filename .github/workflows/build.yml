name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Force Modern Android Version (Fix Bluetooth & Speech)
      run: |
        # ग्रैडल में बिना किसी फोल्डर झंझट के सीधे प्रोजेक्ट का न्यूनतम SDK वर्ज़न 21 सेट करना
        flutter pub run flutter_blue_plus:add_permissions || true

    - name: Build APK
      run: |
        # ब्लूटूथ और वॉइस प्लगइन्स के लिए सही सेटिंग्स के साथ बिल्ड शुरू करना
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSOS-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
