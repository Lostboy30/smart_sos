name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Latest Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0' # सबसे नया स्टेबल वर्ज़न जो ग्रैडल एरर को खुद संभालता है

    - name: Auto-Create and Fix Android Structure
      run: |
        flutter config --no-analytics
        # फ्रेश एंड्रॉयड प्रोजेक्ट तैयार करना
        flutter create --platforms=android --project-name=smart_emergency_sos .
        
        # सभी प्लगइन्स के लिए आवश्यक minSdkVersion को 21 पर सेट करना
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        
        # नए फ़्लटर वर्ज़न के मुताबिक कम्फर्टेबल सेटिंग्स फ़ोर्स करना
        sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build Final APK Release
      run: |
        # सीधा और साफ-सुथरा बिल्ड कमांड
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartSOS-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        
