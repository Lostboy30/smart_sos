name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0' # सुपर-कंपैटिबल और स्टेबल वर्ज़न जो पैकेजेस को क्रैश नहीं होने देगा

    - name: Core Flutter Setup
      run: |
        flutter config --no-analytics
        # अगर एंड्रॉइड फ़ोल्डर पहले से है तो उसे डिस्टर्ब नहीं करेगा, नहीं तो नया बनाएगा
        if [ ! -d "android" ]; then
          flutter create --platforms=android --project-name=smartsos .
        fi

    - name: Install dependencies
      run: |
        flutter pub get

    - name: Build APK
      run: |
        flutter build apk --release
